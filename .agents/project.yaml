# Project configuration consumed by AI agents (Claude, Cursor, Gemini, Codex, etc.)
# when they encounter {{VAR_NAME}} references in prompts and docs.
# Variable names are snake_case; the AI maps {{PROJECT_NAME}} -> project.project_name lexically.
# Edit values manually.
# Every unfilled field is `null` plus a TODO comment with a concrete example.
#
# NOTE: This is the project-starter TEMPLATE. All values are intentionally `null`.
# Each downstream project that uses this starter must fill in the real values.

project:
  project_name: Bunkai # Brand name for the product (kanji 分解 — "the art of breaking down a kata into its applications").
  project_key: BK # Issue tracker key (Jira project key prefix).
  webapp_domain: bunkai.io # Primary production domain. Defensive domain bankai.io redirects here.

backend:
  backend_repo: . # Monorepo — backend lives in `app/api/` of the Next.js project for MVP. Spin out to a NestJS service when self-hosted Docker Compose lands (see SRS/architecture-specs.md).
  backend_stack: Next.js 15 (App Router, API routes) + Supabase # MVP cloud-validation stack. Self-hosted edition target: NestJS + Postgres + Redis + MinIO + Better Auth (Phase 2).
  backend_entry: app/api # Next.js API route handlers.

frontend:
  frontend_repo: . # Monorepo — same Next.js app.
  frontend_stack: Next.js 15 + React 19 + TypeScript + Tailwind + shadcn/ui + Monaco Editor + TanStack Table + React Flow # Editor for ATCs (Monaco). Table view (TanStack). Mind-map view (React Flow). Mind-map 3D (react-force-graph) is Phase 3.
  frontend_entry: app
  design_md_path: null # Defaults to ./DESIGN.md. Source mockups live in `.context/designs/bunkai-test-management-tool/`.

database:
  db_type: Supabase (PostgreSQL 16) # MVP. pgvector planned for semantic ATC search (Phase 2). Self-hosted edition uses plain Postgres in Docker.

issue_tracker:
  issue_tracker: Jira
  issue_tracker_cli: acli
  atlassian_url: upexgalaxy67.atlassian.net
  atlassian_site: upexgalaxy67 # subdomain used by acli

testing:
  default_env: local # fill per project — Default working environment — must match a key under `environments:` (e.g. staging)

# Variables declared above that are consumed OUTSIDE the {{TEMPLATE}} system
# (env vars in scripts/, shell `yq` reads embedded in skill docs, etc.).
# `bun run vars:check` skips DECLARED_BUT_UNUSED warnings for these.
# Each entry MUST include an inline `#` comment explaining WHERE the variable
# is consumed — if the comment is missing, the linter fails with
# EXTERNAL_CONSUMER_UNDOCUMENTED so the allowlist cannot rot silently.
external_consumers:
  - default_env # consumed implicitly by the AI variable resolver (sets active env for {{WEB_URL}} / {{API_URL}} / ...) AND by scripts/agents-setup.ts via process.env.DEFAULT_ENV in --non-interactive mode
  - design_md_path # read by `yq '.design_md_path'` inside bash code fences of .claude/skills/{design-system/references/getdesign-matcher.md, project-bootstrap/references/frontend-setup.md}
  - api_mcp # reserved env-scoped slot — placeholder for an MCP server that exposes the project's REST API (sister to db_mcp). Currently no skill/prompt resolves {{API_MCP}}; the slot is kept so projects that DO expose an API MCP can plug it in without a schema migration. Provisioned per-env by scripts/agents-setup.ts (API_MCP_LOCAL, API_MCP_STAGING, ...).

# Per-environment config. Add/remove environments freely (production, dev, qa, uat, etc.).
# Each environment must define ALL four keys: web_url, api_url, db_mcp, api_mcp.
# Prompts referencing {{WEB_URL}} / {{API_URL}} / {{DB_MCP}} / {{API_MCP}} resolve to the
# active environment (`testing.default_env` above, or a session override).
# For explicit cross-env references use {{environments.<env>.<var>}} (e.g. {{environments.local.web_url}}).
environments:
  local:
    web_url: 'http://localhost:3000' # fill per project — Frontend URL for local env (e.g. http://localhost:3000)
    api_url: 'http://localhost:3000/api' # fill per project — API base URL for local env (e.g. http://localhost:3000/api)
    db_mcp: fmbpikzpkafptqximhxn.supabase.co # fill per project — MCP server name for local DB (e.g. myproject-local-db)
    api_mcp: myproject-local-api # fill per project — MCP server name for local API (e.g. myproject-local-api)
  staging:
    web_url: staging-bunkai.vercel.app # fill per project — Frontend URL for staging env (e.g. https://staging.myproject.com)
    api_url: staging-bunkai.vercel.app/api # fill per project — API base URL for staging env (e.g. https://api-staging.myproject.com)
    db_mcp: fmbpikzpkafptqximhxn.supabase.co # fill per project — MCP server name for staging DB (e.g. myproject-staging-db)
    api_mcp: myproject-staging-api # fill per project — MCP server name for staging API (e.g. myproject-staging-api)
