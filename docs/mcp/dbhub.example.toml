# ============================================
# DBHUB CONFIGURATION - EJEMPLO
# ============================================
# Archivo: dbhub.toml (en root del proyecto)
# Documentación: https://dbhub.ai/config/toml
#
# Este archivo configura las conexiones de base de datos para el MCP de DBHub.
# IMPORTANTE: dbhub.toml SE COMMITEA — usá expansión ${VAR} (sin secretos en el
# archivo; los valores reales viven en .env). Es parte de la estrategia de testing,
# misma convención que .mcp.json / opencode.jsonc. Solo si necesitás pegar
# credenciales LITERALES, hacelo en dbhub.local.toml (ya gitignored), nunca aquí.
#
# ⚠️  AUDIT 2026-05-11: una versión anterior de este template tenía un user/password
# con apariencia real (qa_team.czuusjchqpgvanvbdrnz / QA_SoloQ_2024_Secure!).
# Si esas credenciales eran reales y existen en la historia de git, rotalas en el
# proveedor (Supabase) — borrar del template no las borra de la historia.

# ============================================
# FUENTE DE DATOS: PostgreSQL (Supabase)
# ============================================

[[sources]]
id = "soloq"
type = "postgres"
host = "aws-1-us-east-2.pooler.supabase.com"
port = 5432
database = "postgres"
user = "{{DB_USER}}"
password = "{{DB_PASSWORD}}"
sslmode = "require"

# ============================================
# OPCIONES AVANZADAS
# ============================================
# Puedes agregar opciones adicionales por fuente:
# lazy = true              # Defer connection until first query
# connection_timeout = 60  # Timeout de conexión en segundos
# query_timeout = 30       # Timeout de consulta en segundos

